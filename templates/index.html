<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: #f4f4f9;
        }
        textarea {
            width: 60%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>📧 Email Spam Classifier</h1>
    <form action="/predict" method="POST">
        <textarea name="email" placeholder="Enter your email text here..." required>{{ email if email else '' }}</textarea><br><br>
        <button type="submit">Check</button>
    </form>

    {% if prediction %}
    <div class="result">
        Result: {{ prediction }}
    </div>
    {% endif %}
</body>
</html>
